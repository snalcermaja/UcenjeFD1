<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlpineJS Kviz</title>
    <link rel="stylesheet" href="css/app.css">
    <script defer src="js/alpinejs-3.15.8.js"></script>
</head>
<body x-data="kvizAplikacija()" x-init="pokreniNoviKrug()">

    <div class="spremnik-kviza">
        <div class="kartica">
            
            <div x-show="!kvizZavrsen" x-transition>
                <div class="zaglavlje">
                    <h4 class="naslov">JS Kviz</h4>
                    <span class="badge" x-text="`Pitanje ${indeks + 1}/5`">Status</span>
                </div>

                <div class="progres-okvir">
                    <div class="progres-traka" :style="`width: ${ (indeks / 5) * 100 }%`"></div>
                </div>

                <h5 class="tekst-pitanja" x-text="trenutnoPitanje.pitanje"></h5>

                <div class="popis-odgovora">
                    <template x-for="odgovor in trenutnoPitanje.odgovori" :key="odgovor">
                        <div>
                        <button 
                            class="gumb-odgovor" 
                            x-text="odgovor" 
                            @click="obradiOdgovor(odgovor)">
                        </button>
                        <hr>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="kvizZavrsen" class="tekst-centar" x-transition>
                <h2>Kraj kruga!</h2>
                <div class="veliki-rezultat" x-text="`${rezultat}/5`"></div>
                <h3 x-text="dajOcjenu()"></h3>
                <button class="gumb-akcija" @click="pokreniNoviKrug()">
                    Pokreni novi krug (novih 5 pitanja)
                </button>
            </div>

        </div>
    </div>

    <script src="js/pitanja.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
